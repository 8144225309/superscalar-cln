# Plugin test CI.
#
# Runs on every push to main and every PR. Builds the CLN bLIP-56 fork
# + SuperScalar library + this plugin, then runs pytest via `make test`.
#
# Design choices:
#   - apt dep list matches upstream CLN's `.github/workflows/ci.yaml`
#     so we don't drift out of sync as upstream gains new deps.
#   - Rust toolchain installed via the standard dtolnay action; needed
#     for cln-grpc, lsps-plugin, bip353-plugin (all Rust).
#   - protobuf-compiler (`protoc`) needed for cln-grpc's prost-build.
#   - MuSig2 module is enabled in wally's bundled secp256k1-zkp via a
#     sed before `./configure` — the plugin links against that module
#     for factory signing.
#   - The `make test` target in the plugin's Makefile injects
#     LIGHTNINGD / SUPERSCALAR_PLUGIN / PATH so pyln-testing picks up
#     the correct binaries. Keeping CI on `make test` rather than
#     `pytest tests/` directly gives one source of truth for test env.
#   - Cache scope: CLN externals (libsodium, libwally-core, etc.) and
#     the Cargo registry. CLN's own target/ isn't cached because it
#     changes on every plugin PR when the CLN commit moves, and the
#     rebuild is still faster than the cache thrash.
#   - Signet smoke tests (tests/signet/*.sh) are excluded by pytest
#     testpaths; they need real signet, not achievable in CI.

name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CLN_REF: blip-56
  SS_REF: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CLN_DIR: ${{ github.workspace }}/cln-blip56
      SS_DIR: ${{ github.workspace }}/SuperScalar
      SUPERSCALAR_PLUGIN: ${{ github.workspace }}/cln-blip56/plugins/superscalar
      PLUGIN_SRC: ${{ github.workspace }}/superscalar-cln

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: superscalar-cln

      # apt list tracks upstream CLN's CI to avoid drift. Additions:
      #   lowdown            — CLN's man-page generator
      #   protobuf-compiler  — cln-grpc build.rs needs protoc
      - name: Install apt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential libsqlite3-dev \
            libsodium-dev libpq-dev libtool libunbound-dev \
            libgmp-dev pkg-config zlib1g-dev libssl-dev \
            gettext cmake python3-pip \
            lowdown protobuf-compiler

      # Needed for cln-grpc (Rust) to build. Without this, the plugin
      # compile stage that depends on CLN's target/debug layout fails.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # pyln-testing's bitcoind fixture runs bitcoind in regtest mode per
      # test. Ubuntu's bitcoind in apt is too old for recent CLN; pin a
      # known-working version from bitcoincore.org. Matches upstream CLN CI
      # behavior. Version can bump in lockstep with upstream when needed.
      - name: Install bitcoind
        env:
          BITCOIN_VERSION: "28.0"
        run: |
          wget -q "https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_VERSION}/bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz"
          tar xzf "bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz"
          sudo install -m 0755 -o root -g root -t /usr/local/bin \
            "bitcoin-${BITCOIN_VERSION}/bin/bitcoind" \
            "bitcoin-${BITCOIN_VERSION}/bin/bitcoin-cli"
          bitcoind --version | head -1

      - name: Checkout CLN fork
        uses: actions/checkout@v4
        with:
          repository: 8144225309/lightning
          ref: ${{ env.CLN_REF }}
          path: cln-blip56
          submodules: recursive

      - name: Checkout SuperScalar library
        uses: actions/checkout@v4
        with:
          repository: 8144225309/SuperScalar
          ref: ${{ env.SS_REF }}
          path: SuperScalar

      # Cache the slow-to-rebuild parts. Key includes the resolved CLN
      # commit so when we bump CLN_REF or upstream moves, cache invalidates.
      - name: Resolve CLN HEAD for cache key
        id: cln-head
        working-directory: cln-blip56
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache CLN externals
        uses: actions/cache@v4
        with:
          path: cln-blip56/external
          key: cln-externals-${{ steps.cln-head.outputs.sha }}-${{ runner.os }}
          restore-keys: |
            cln-externals-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('cln-blip56/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # The plugin uses MuSig2 via CLN's bundled secp256k1-zkp. Wally's
      # default configure doesn't enable the musig module; enable it
      # here before ./configure so the headers are available at link time.
      - name: Enable MuSig2 module in libwally-core
        working-directory: cln-blip56
        run: |
          sed -i 's/\[--enable-module-ecdsa-s2c\]/[--enable-module-ecdsa-s2c], [--enable-module-musig]/' \
            external/libwally-core/configure.ac

      # Python deps in three buckets:
      #   - mako: CLN's tools/generate-wire.py uses it to render wire headers.
      #     Without it, `make` on CLN fails at the first wiregen step.
      #   - grpcio-tools: CLN compiles its pyln-grpc Python bindings via
      #     `python3 -m grpc_tools.protoc`. Without it, `make` fails after
      #     libwally builds, trying to regenerate protobuf stubs.
      #   - requirements-dev.txt: pyln-testing + pytest plugins for the
      #     test suite itself.
      # (Upstream CLN's own CI pip-installs this whole set via their
      # requirements.txt; we're reproducing the relevant pieces.)
      - name: Install Python deps (CLN wire gen + grpc stubs + pytest)
        working-directory: superscalar-cln
        run: |
          pip install mako grpcio-tools
          pip install -r requirements-dev.txt

      - name: Build CLN
        working-directory: cln-blip56
        run: |
          ./configure --disable-valgrind
          make -j$(nproc)

      - name: Build SuperScalar
        working-directory: SuperScalar
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DSECP256K1_ECMULT_WINDOW_SIZE=15
          cmake --build build -j$(nproc)

      - name: Build plugin
        working-directory: superscalar-cln
        run: bash build-plugin.sh

      # `make test` in the plugin's Makefile injects LIGHTNINGD,
      # SUPERSCALAR_PLUGIN, and PATH so pyln-testing picks up the fork
      # binary instead of whatever `lightningd` happens to be in PATH.
      # Local-dev parity: `make test` does the same thing on a laptop
      # and on CI.
      - name: Run pytest via make test
        working-directory: superscalar-cln
        run: make test

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            /tmp/ltests-*
            superscalar-cln/tests/.pytest_cache
          if-no-files-found: ignore
          retention-days: 7
